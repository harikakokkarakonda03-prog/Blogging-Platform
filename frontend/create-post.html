<!DOCTYPE html>
<html>

<head>
    <title>Create Post</title>

    <link
        rel="stylesheet"
        href="style.css">
</head>

<body>
<div class="header">

    <h2 id="welcomeMessage"></h2>

    <button
        class="logout-btn"
        onclick="logout()">
        Logout
    </button>

</div>

<div style="clear:both;"></div>

<hr>
    

<h3>Blog Posts Created</h3>

<div id="posts"></div>


<br><br>
    <script>
        const userId = localStorage.getItem("userId");

if (!userId) {

    window.location.href = "login.html";

}
const userName = localStorage.getItem("userName");

document.getElementById("welcomeMessage").innerText =
    `Welcome ${userName}`;
        
async function loadMyPosts() {


    const userId = localStorage.getItem("userId");

    const response = await fetch(
        `http://localhost:5000/api/posts/user/${userId}`
    );

    const posts = await response.json();

    let output = "";

    posts.forEach(post => {

      output += `

<div class="blog-card">

<h4>${post.title}</h4>



<p>${post.content}</p>

   <div 
class="comments-section"
id="comments-${post.id}">
        Loading comments...
    </div>

    <br>

   <button 
class="delete-btn"
onclick="deletePost(${post.id})">

Delete

</button>

            <button 
class="update-btn"
onclick="editPost(${post.id}, '${post.title}', '${post.content}')">

Update

</button>
</div>
            <hr>
        `;
    });

    document.getElementById("posts").innerHTML = output;
    posts.forEach(post => {
    loadComments(post.id);
});
}
async function loadComments(postId) {

    const response = await fetch(
        `http://localhost:5000/api/comments/${postId}`
    );


    const comments = await response.json();


    let output = "<h4>Comments</h4>";


    let users = {};


    comments.forEach(comment => {


        if(!users[comment.name]){

            users[comment.name] = [];

        }


        users[comment.name].push(
            comment.comment
        );

    });



    for(let user in users){


        output += `

        <div class="user-comment-box">

            <strong>
                ${user}
            </strong>

        `;


        users[user].forEach(text => {


            output += `

                <p>
                    ${text}
                </p>

            `;

        });



        output += `

        </div>

        `;


    }


    document.getElementById(
        `comments-${postId}`
    ).innerHTML = output;

}
async function deletePost(id) {

    const response = await fetch(
        `http://localhost:5000/api/posts/${id}`,
        {
    method: "DELETE",
    headers: {
        "Authorization": localStorage.getItem("token")
    }
}
    );

    const data = await response.json();

    alert(data.message);

    loadMyPosts();
}
async function editPost(id, oldTitle, oldContent) {

    const title = prompt(
        "Enter New Title",
        oldTitle
    );

    const content = prompt(
        "Enter New Content",
        oldContent
    );

    if (!title || !content) {
        return;
    }

    const response = await fetch(
        `http://localhost:5000/api/posts/${id}`,
        {
            method: "PUT",
           headers: {
    "Content-Type": "application/json",
    "Authorization": localStorage.getItem("token")
},
            body: JSON.stringify({
                title,
                content
            })
        }
    );

    const data = await response.json();

    alert(data.message);

    loadMyPosts();
}

loadMyPosts();
function logout() {

    localStorage.removeItem("userId");
    localStorage.removeItem("userName");
    localStorage.removeItem("userEmail");

    window.location.href = "login.html";
}
    </script>

</body>

</html>
